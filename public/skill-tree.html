<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Producer Skill Tree</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #000000;
      --text:    #FFFFFF;
      --muted:   #777777;
      --surface: #0e0e0e;
      --border:  #282828;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #000; color: var(--text); }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
    input  { font-family: inherit; }
    a { color: inherit; text-decoration: underline; text-underline-offset: 2px; }

    /* ── KEYFRAMES ───────────────────────────────── */
    @keyframes node-burst {
      0%   { opacity: 0.1; filter: brightness(5) saturate(2); }
      45%  { opacity: 1;   filter: brightness(2) saturate(1.4); }
      100% { opacity: 1;   filter: brightness(1) saturate(1); }
    }
    @keyframes reveal-tree {
      from { opacity: 0; transform: scale(0.94); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes flavor-in {
      from { opacity: 0; transform: translateY(3px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes conduit-flow {
      from { stroke-dashoffset: var(--edge-len); opacity: 0.15; }
      to   { stroke-dashoffset: 0; opacity: 0.65; }
    }
    circle.node-new { animation: node-burst 0.55s ease forwards; }

    /* ── TRANSITION OVERLAY ──────────────────────── */
    .transition-overlay {
      position: fixed; inset: 0;
      background: #000; z-index: 9998;
      pointer-events: none; opacity: 0;
      transition: opacity 1.28s ease;
    }
    .transition-overlay.covering { opacity: 1; }

    /* ── SCREEN BASE ─────────────────────────────── */
    .screen {
      height: 100dvh; display: flex;
      flex-direction: column; align-items: center;
      background: #000; overflow: hidden;
    }

    /* ── TITLE SCREEN ────────────────────────────── */
    .title-screen {
      justify-content: center; text-align: center; gap: 32px;
      padding: 40px 28px 28px; position: relative;
    }
    .title-h1 {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: clamp(26px, 5.5vw, 50px); font-weight: 400; line-height: 1.15;
    }
    .title-h1 em { font-style: normal; color: #F0C400; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; }
    .title-h1 .sub { font-size: 0.61em; }
    .marquee-wrap {
      width: 100%; overflow: hidden; display: flex;
      -webkit-mask-image: linear-gradient(to right, transparent, #000 18%, #000 82%, transparent);
      mask-image: linear-gradient(to right, transparent, #000 18%, #000 82%, transparent);
    }
    .marquee-track {
      display: flex; flex-shrink: 0;
      animation: marquee 20s linear infinite;
    }
    @keyframes marquee {
      from { transform: translateX(0); }
      to   { transform: translateX(-100%); }
    }
    .marquee-item {
      font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: #444;
      padding: 0 4px; white-space: nowrap;
    }
    .marquee-sep { font-size: 11px; color: #2a2a2a; padding: 0 10px; align-self: center; }
    .title-copyright {
      position: absolute; bottom: 20px; left: 0; right: 0;
      font-family: 'Montserrat', sans-serif;
      font-size: 9px; font-weight: 600; letter-spacing: 0.14em;
      text-transform: uppercase; color: #444; text-align: center;
      display: flex; flex-direction: column; gap: 3px; align-items: center;
    }
    @media (min-width: 600px) {
      .title-copyright { flex-direction: row; justify-content: center; gap: 0; }
      .title-copyright div::after { content: '\00a0|\00a0'; color: #444; }
    }
    .title-copyright a { color: #555; }

    /* ── BUTTONS ─────────────────────────────────── */
    .btn-primary {
      background: #F0C400; color: #000;
      font-size: 14px; font-weight: 700; padding: 13px 44px;
      border-radius: 50px; letter-spacing: 0.07em;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 20px #F0C40018;
    }
    .btn-primary:hover  { transform: scale(1.04); box-shadow: 0 0 32px #F0C40045; }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:disabled { opacity: 0.35; pointer-events: none; }

    /* ── NAME SCREEN ─────────────────────────────── */
    .name-screen {
      justify-content: center; text-align: center; gap: 18px; padding: 48px 24px;
      transition: opacity 0.18s ease;
    }
    .name-screen h2 {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: clamp(22px, 5vw, 32px); font-weight: 700;
    }
    .name-input {
      background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px;
      color: var(--text); font-size: 20px; font-weight: 600;
      padding: 14px 20px; width: 100%; max-width: 320px;
      text-align: center; outline: none; transition: border-color 0.2s;
    }
    .name-input:focus { border-color: #F0C400; }
    .radio-row { display: flex; gap: 24px; justify-content: center; }
    .radio-opt {
      display: flex; align-items: center; gap: 9px;
      cursor: pointer; font-size: 15px; font-weight: 600; user-select: none;
    }
    .radio-circle {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s; flex-shrink: 0;
    }
    .radio-circle.on { border-color: #F0C400; }
    .radio-circle.on::after { content: ''; width: 10px; height: 10px; border-radius: 50%; background: #F0C400; }
    .alias-input-wrap {
      width: 100%; max-width: 320px;
      min-height: 58px;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── SURVEY SCREEN ───────────────────────────── */
    /* Flex column — tree takes remaining space, q-card sits at bottom */
    .survey-screen {
      justify-content: flex-start; overflow: hidden;
    }
    .survey-tree-panel {
      flex: 1; min-height: 0; width: 100%;
      overflow: hidden; position: relative;
    }
    .xp-bar-wrap {
      position: absolute; top: 0; left: 0; right: 0; z-index: 10;
      padding: 8px 16px 4px;
    }
    .xp-meta {
      display: flex; justify-content: space-between;
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 5px;
    }
    .xp-track { height: 2px; background: #111; border-radius: 2px; overflow: hidden; }
    .xp-fill  { height: 100%; border-radius: 2px; transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1); }
    .constellation-svg { width: 100%; height: 100%; display: block; }

    /* Q&A card — flex child, not absolute */
    .q-card-wrap {
      flex-shrink: 0;
      width: 100%;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 10px 20px 18px;
    }
    @media (min-width: 800px) {
      .survey-screen { flex-direction: row; }
      .survey-tree-panel { flex: 1; width: auto; height: 100%; }
      .q-card-wrap {
        width: 520px; flex-shrink: 0;
        height: 100%; overflow-y: auto;
        border-top: none;
        border-left: 1px solid rgba(255,255,255,0.07);
        padding: 48px 40px;
        display: flex; flex-direction: column; justify-content: center;
      }
      .card-top-row { margin-bottom: 10px; }
      .area-chip { font-size: 18px; padding: 5px 16px; gap: 9px; }
      .chip-dot { width: 9px; height: 9px; }
      .back-btn { font-size: 20px; }
      .progress-dots { gap: 9px; margin-bottom: 14px; }
      .pdot { width: 11px; height: 11px; }
      .q-text {
        font-size: clamp(24px, 2.2vw, 30px); min-height: 4.4em;
        margin-bottom: 20px; text-align: left; justify-content: flex-start;
      }
      .slider-line-bg { top: 18px; }
      .slider-dot { width: 36px; height: 36px; }
      .slider-pos { gap: 12px; }
      .slider-label { font-size: 16px; }
      .flavor-wrap { height: 64px; }
      .flavor-text { font-size: 20px; }
      .flavor-text .flavor-sub { font-size: 18px; }
    }
    .q-card-inner { max-width: 500px; margin: 0 auto; }

    /* Card top row: area chip + back button */
    .card-top-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 4px;
    }
    .area-chip {
      display: inline-flex; align-items: center; gap: 5px;
      border-radius: 20px; padding: 3px 10px;
      font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    }
    .chip-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .back-btn {
      font-size: 13px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: #444;
      padding: 4px 2px; transition: color 0.15s; line-height: 1;
    }
    .back-btn:hover { color: #888; }
    .back-btn:disabled { opacity: 0; pointer-events: none; }

    .progress-dots { display: flex; gap: 5px; margin-bottom: 8px; }
    .pdot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); transition: background 0.25s; }
    .q-text {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: clamp(15px, 3.5vw, 18px); font-weight: 400;
      line-height: 1.5; min-height: 4.4em;
      margin-bottom: 12px; display: flex; align-items: flex-end;
      text-align: center; justify-content: center;
    }

    /* Slider */
    .slider-wrap { position: relative; padding: 0 0 2px; user-select: none; }
    .slider-line-bg {
      position: absolute; top: 13px; left: calc(12.5%); right: calc(12.5%);
      height: 2px; background: var(--border); border-radius: 1px; overflow: hidden;
    }
    .slider-line-fill { height: 100%; border-radius: 1px; transition: width 0.25s ease; }
    .slider-positions { display: flex; position: relative; z-index: 1; }
    .slider-pos {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 7px; cursor: pointer; padding: 0 2px;
    }
    .slider-dot {
      width: 24px; height: 24px; border-radius: 50%;
      border: 2px solid var(--border); background: var(--bg);
      transition: transform 0.15s, border-color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .slider-pos:hover .slider-dot { border-color: #555; }
    .slider-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
      text-transform: uppercase; color: var(--muted); text-align: center;
      line-height: 1.2; transition: color 0.15s;
    }
    .flavor-wrap { height: 42px; display: flex; align-items: center; justify-content: center; padding: 2px 0 0; }
    .flavor-text {
      font-size: 13px; line-height: 1.4; color: var(--muted);
      text-align: center; animation: flavor-in 0.18s ease both;
    }
    .flavor-text .flavor-sub { color: #555; font-size: 12px; }

    /* ── TRANSITION SCREEN ───────────────────────── */
    .transition-screen {
      justify-content: center; align-items: center;
      gap: 28px; padding: 48px 24px; text-align: center;
    }
    .transition-screen h2 {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: clamp(18px, 4.5vw, 26px); font-weight: 700;
      max-width: 420px; line-height: 1.4;
    }
    .transition-options {
      display: flex; flex-direction: column; gap: 10px;
      width: 100%; max-width: 460px;
    }
    .btn-transition {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-size: 13px; line-height: 1.45; padding: 10px 16px;
      text-align: left; transition: border-color 0.15s, background 0.15s;
      cursor: pointer;
    }
    .btn-transition:hover { border-color: #F0C400; background: #F0C40008; }
    .btn-transition:active { transform: scale(0.98); }

    /* ── AGENT SCREEN ────────────────────────────── */
    .agent-screen {
      justify-content: flex-start; align-items: center;
      padding: 0; gap: 0; overflow: hidden; position: relative;
    }
    .agent-header {
      width: 100%; padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0; position: relative;
    }
    .agent-info-btn {
      margin-left: auto; width: 18px; height: 18px; border-radius: 50%;
      border: 1px solid #444; color: #555; background: none;
      font-size: 11px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .agent-info-btn:hover { border-color: #666; color: #888; }
    .agent-info-tooltip {
      position: absolute; top: 48px; right: 16px;
      background: #1a1a1a; border: 1px solid #333; border-radius: 10px;
      padding: 12px 14px; font-size: 13px; line-height: 1.6; color: #bbb;
      width: 260px; z-index: 10;
    }
    .agent-header-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #F0C400;
      box-shadow: 0 0 8px #F0C40080; flex-shrink: 0;
    }
    .agent-header-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
    }
    .agent-messages {
      flex: 1; width: 100%; max-width: 560px;
      overflow-y: auto; padding: 20px 20px 8px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .agent-msg {
      display: flex; flex-direction: column; gap: 4px;
      max-width: 88%;
    }
    .agent-msg.user { align-self: flex-end; align-items: flex-end; }
    .agent-msg.assistant { align-self: flex-start; align-items: flex-start; }
    .agent-bubble {
      padding: 11px 14px; border-radius: 14px;
      font-size: 14px; line-height: 1.6;
    }
    .agent-msg.user .agent-bubble {
      background: #F0C400; color: #000; border-bottom-right-radius: 4px;
    }
    .agent-msg.assistant .agent-bubble {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-bottom-left-radius: 4px;
    }
    .agent-typing {
      display: flex; gap: 5px; align-items: center; padding: 11px 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; border-bottom-left-radius: 4px;
    }
    .agent-typing span {
      width: 6px; height: 6px; border-radius: 50%; background: #555;
      animation: agent-bounce 1.2s ease infinite;
    }
    .agent-typing span:nth-child(2) { animation-delay: 0.2s; }
    .agent-typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes agent-bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }
    .agent-input-row {
      width: 100%; max-width: 560px;
      padding: 12px 16px 20px;
      display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
    }
    .agent-input {
      flex: 1; background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 14px;
      padding: 10px 13px; outline: none; resize: none;
      transition: border-color 0.2s; min-height: 42px; max-height: 120px;
      font-family: inherit; line-height: 1.5;
    }
    .agent-input:focus { border-color: #F0C400; }
    .btn-agent-send {
      background: #F0C400; color: #000; border-radius: 10px;
      width: 40px; height: 40px; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
      transition: transform 0.12s, opacity 0.12s;
    }
    .btn-agent-send:hover { transform: scale(1.06); }
    .btn-agent-send:disabled { opacity: 0.35; pointer-events: none; }
    .agent-toast {
      position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
      color: #ccc; font-size: 12px; padding: 7px 14px;
      white-space: nowrap; pointer-events: none;
      animation: toastIn 0.2s ease, toastOut 0.3s ease 2.7s forwards;
    }
    @keyframes toastIn  { from { opacity: 0; transform: translateX(-50%) translateY(6px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    @keyframes toastOut { to   { opacity: 0; transform: translateX(-50%) translateY(4px); } }

    /* ── REVEAL CTA ──────────────────────────────── */
    .btn-coach {
      width: 100%; max-width: 480px;
      background: transparent; border: 1.5px solid #F0C400;
      color: #F0C400; border-radius: 50px;
      font-size: 13px; font-weight: 700; padding: 12px 24px;
      letter-spacing: 0.05em; transition: background 0.15s, color 0.15s;
    }
    .btn-coach:hover { background: #F0C400; color: #000; }


    /* ── RESULTS SCREEN ──────────────────────────── */
    .results-screen {
      overflow-y: auto; overflow-x: hidden;
      justify-content: flex-start;
      padding: 22px 20px 36px; gap: 14px;
      width: 100%; max-width: 560px; margin: 0 auto;
      align-items: stretch;
    }
    .results-header { text-align: center; }
    .results-header h2 {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: clamp(16px, 3.8vw, 24px); font-weight: 700; margin-bottom: 3px;
    }
    .results-header p { font-size: 11px; color: var(--muted); }
    .score-grid { display: flex; flex-direction: column; gap: 6px; }
    .score-row  { display: flex; align-items: center; gap: 12px; }
    .score-lbl  {
      font-size: 9px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
      color: var(--muted); width: 84px; flex-shrink: 0;
    }
    .score-track { flex: 1; height: 4px; background: #111; border-radius: 2px; overflow: hidden; }
    .score-fill  { height: 100%; border-radius: 2px; }
    .score-val   { font-size: 10px; font-weight: 800; width: 28px; text-align: right; flex-shrink: 0; }
    .email-gate {
      background: var(--surface);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 18px; display: flex; flex-direction: column; gap: 10px; text-align: center;
    }
    .email-gate h3 {
      font-family: 'Libre Baskerville', Georgia, serif; font-size: 16px; font-weight: 700;
    }
    .email-gate p { font-size: 11px; color: var(--muted); line-height: 1.6; }
    .email-row { display: flex; gap: 7px; }
    .email-input {
      flex: 1; background: var(--bg); border: 1.5px solid var(--border); border-radius: 7px;
      color: var(--text); font-size: 13px; padding: 9px 11px;
      outline: none; transition: border-color 0.2s; min-width: 0;
    }
    .email-input:focus { border-color: #F0C400; }
    .email-input.invalid { border-color: #FC8181; }
    .btn-submit {
      background: #F0C400; color: #000; font-size: 12px; font-weight: 800;
      padding: 9px 16px; border-radius: 7px; white-space: nowrap;
      transition: transform 0.12s; flex-shrink: 0;
    }
    .btn-submit:hover  { transform: scale(1.04); }
    .btn-submit:active { transform: scale(0.97); }
    .btn-submit:disabled { opacity: 0.35; pointer-events: none; }

    /* ── REVEAL SCREEN ───────────────────────────── */
    .reveal-screen {
      overflow-y: auto; overflow-x: hidden;
      justify-content: flex-start; align-items: center;
      padding: 20px 20px 40px; gap: 0;
      flex-direction: column;
    }
    .reveal-body {
      width: 100%; max-width: 400px;
      display: flex; flex-direction: column; gap: 10px; align-items: center;
      margin-bottom: 20px;
    }
    .reveal-tree-wrap {
      width: min(100%, 160px);
      animation: reveal-tree 0.75s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .reveal-tree-wrap svg { width: 100%; aspect-ratio: 1; height: auto; }
    .reveal-msg { text-align: center; width: 100%; display: flex; flex-direction: column; gap: 8px; }
    .reveal-msg h2 {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: clamp(20px, 5vw, 28px); font-weight: 700;
    }
    .reveal-msg p { font-size: 12px; color: var(--muted); line-height: 1.7; }
    .connect-block {
      font-size: 11px; line-height: 2;
      border-top: 1px solid var(--border); padding-top: 10px;
      display: flex; flex-direction: column; gap: 1px; align-items: center;
    }
    .connect-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px; font-weight: 700; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 3px;
    }
    .connect-link { color: #F0C400AA; }
    .connect-link:hover { color: #F0C400; }
    .connect-divider { color: #333; margin: 0 6px; }
    .social-proof {
      width: 100%; border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; background: var(--surface);
    }
    .social-proof-header { padding: 12px 14px 10px; border-bottom: 1px solid var(--border); }
    .social-proof-stat {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px; font-weight: 700; letter-spacing: 0.18em;
      text-transform: uppercase; color: #F0C400; margin-bottom: 3px;
    }
    .social-proof-desc { font-size: 11px; color: var(--muted); line-height: 1.5; }
    .social-proof-img-wrap img { width: 100%; display: block; filter: brightness(0.75) saturate(0.8); }
    .reveal-footer {
      font-family: 'Montserrat', sans-serif;
      font-size: 8px; font-weight: 600; letter-spacing: 0.14em;
      text-transform: uppercase; color: #444; text-align: center;
    }
    .reveal-footer a { color: #555; }

    /* ── YES / NO BUTTONS ───────────────────────── */
    .yn-row { display: flex; gap: 12px; margin-top: 20px; }
    .btn-yn {
      flex: 1; padding: 15px 0; border-radius: 10px;
      font-size: 15px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
      border: 1.5px solid var(--border); background: transparent; color: #666;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
    }
    .btn-yn:not(:disabled):hover { transform: scale(1.03); border-color: #555; color: #aaa; }
    .btn-yn:disabled { opacity: 0.45; pointer-events: none; }
    .btn-yn.selected-yes { background: var(--area-color); border-color: var(--area-color); color: #000; }
    .btn-yn.selected-no  { background: #1e1e1e; border-color: #444; color: #888; }

    /* ── PDF DOWNLOAD BUTTON ─────────────────────── */
    .btn-download {
      background: #F0C400; color: #000;
      font-size: 13px; font-weight: 800; padding: 12px 28px;
      border-radius: 50px; letter-spacing: 0.06em;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 20px #F0C40018; width: 100%;
    }
    .btn-download:hover  { transform: scale(1.03); box-shadow: 0 0 32px #F0C40045; }
    .btn-download:active { transform: scale(0.97); }
    .btn-download:disabled { opacity: 0.35; pointer-events: none; }

    /* ── REVEAL SCORES ───────────────────────────── */
    .reveal-scores { width: 100%; display: flex; flex-direction: column; gap: 4px; }

    /* ── PARTICLES ───────────────────────────────── */
    #particles-host { position: fixed; inset: 0; pointer-events: none; z-index: 999; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="particles-host"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ═══════════════════════════════════════════════
    // AREAS — Ideation first
    // ═══════════════════════════════════════════════
    const AREAS = [
      { id: 'ideation',    label: 'Ideation',    color: '#FFFFFF' },
      { id: 'composition', label: 'Composition', color: '#60A5FA' },
      { id: 'theory',      label: 'Theory',      color: '#FCD34D' },
      { id: 'daw',         label: 'DAW',         color: '#F97316' },
      { id: 'mixing',      label: 'Mixing',      color: '#86EFAC' },
      { id: 'mastering',   label: 'Mastering',   color: '#16A34A' },
      { id: 'collab',      label: 'Collab',      color: '#A78BFA' },
      { id: 'artwork',     label: 'Artwork',     color: '#F472B6' },
      { id: 'release',     label: 'Release',     color: '#EF4444' },
      { id: 'promo',       label: 'Promo',       color: '#22D3EE' },
    ];

    // ═══════════════════════════════════════════════
    // QUESTIONS (70 total — area order matches AREAS)
    // inv: true = "No" scores the point (hidden inversion)
    // ═══════════════════════════════════════════════
    const QUESTIONS = [
      // ── IDEATION (0) ─────────────────────────────
      { area:0, q:"Can you name the primary genre of your own music?" },
      { area:0, q:"Have you intentionally listened to music outside your usual genre in the last 30 days?" },
      { area:0, q:"Have you started a new song idea in the last 30 days that you chose not to develop further?" },
      { area:0, q:"I usually stay within the bounds of my usual genre.", inv:true },
      { area:0, q:"I have a running log of new music I've discovered." },
      { area:0, q:"I capture song ideas outside of my DAW." },
      { area:0, q:"I have created something recently with no intention of finishing it." },

      // ── COMPOSITION (1) ──────────────────────────
      { area:1, q:"Can you name the sections of your most recent track?" },
      { area:1, q:"My tracks tend to follow the same structural pattern every time.", inv:true },
      { area:1, q:"I have gone back and rearranged a track I made more than a year ago." },
      { area:1, q:"I have finished the last three tracks I started." },
      { area:1, q:"When listening to music, I actively notice the song's structure." },
      { area:1, q:"I can describe how my most recent track is designed to feel different at the end than it does at the beginning." },
      { area:1, q:"I am equally comfortable arranging a track with 2 elements as I am with 50." },

      // ── THEORY (2) ───────────────────────────────
      { area:2, q:"I believe music theory is there to tell me what I'm allowed and not allowed to do in my music.", inv:true },
      { area:2, q:"I can identify a C major chord on at least one instrument." },
      { area:2, q:"I know exactly what I would do in a 20 minute theory practice session." },
      { area:2, q:"I have used theory to analyze a song by an artist I admire." },
      { area:2, q:"I sometimes use visual aids like diagrams or charts to understand theory concepts." },
      { area:2, q:"I regularly produce at the full capacity of my music theory knowledge." },
      { area:2, q:"Learning music theory makes me feel less creative.", inv:true },

      // ── DAW (3) ──────────────────────────────────
      { area:3, q:"I feel fast in my DAW." },
      { area:3, q:"I have uninstalled or removed plugins from my setup in the last 6 months." },
      { area:3, q:"I have questioned whether my current workflow still serves me in the last 30 days." },
      { area:3, q:"I have watched a tutorial or read documentation specifically about my DAW in the last 30 days." },
      { area:3, q:"I have opened my DAW at least twice in the last week." },
      { area:3, q:"I have tried at least one other DAW besides my primary one." },
      { area:3, q:"When I open my DAW with no idea, I know how to start anyway." },

      // ── MIXING (4) ───────────────────────────────
      { area:4, q:"I understand why mixing is considered a separate workflow from composing." },
      { area:4, q:"I know what the single most important tool in mixing is." },
      { area:4, q:"I can name the three most essential effects in a mix." },
      { area:4, q:"I have revisited a song to remix it in the last three months." },
      { area:4, q:"I can predict what a plugin parameter will do before I move it." },
      { area:4, q:"I have received feedback on a mix from another producer." },
      { area:4, q:"I have a mix I would feel confident sending to a mastering engineer today." },

      // ── MASTERING (5) ────────────────────────────
      { area:5, q:"I understand where the line is drawn between mixing and mastering." },
      { area:5, q:"I can look at a waveform and have an opinion on whether it needs mastering." },
      { area:5, q:"I know what the single most important tool in mastering is." },
      { area:5, q:"I can name the three most essential tools in mastering." },
      { area:5, q:"I have used a LUFS meter to check the loudness of a master." },
      { area:5, q:"I can master a track using only my ears, a reference track, and a limiter." },
      { area:5, q:"I can tell whether a track needs mastering just by looking at the waveform.", inv:true },

      // ── COLLAB (6) ───────────────────────────────
      { area:6, q:"I recognize that working in isolation is one of the biggest obstacles a producer can face." },
      { area:6, q:"I have shared an unfinished track with another producer in the last 30 days." },
      { area:6, q:"I have collaborated on a track with another producer in the last 6 months." },
      { area:6, q:"I am part of a music community I show up in regularly." },
      { area:6, q:"I am intentional about who I surround myself with musically." },
      { area:6, q:"I have at least one released or finished track that involved another person." },
      { area:6, q:"I have changed something in my music based on feedback from another producer." },

      // ── ARTWORK (7) ──────────────────────────────
      { area:7, q:"I understand that visual presentation is part of a music release, not an afterthought." },
      { area:7, q:"I have released a song with intentional cover art in the last 6 months." },
      { area:7, q:"I have created video content related to my music in the last 30 days." },
      { area:7, q:"I have a consistent visual identity across my music platforms." },
      { area:7, q:"I regularly post content that isn't just finished music releases." },
      { area:7, q:"I have studied how a visual artist I admire presents themselves online." },
      { area:7, q:"I have delayed a release because the artwork wasn't ready.", inv:true },

      // ── RELEASE (8) ──────────────────────────────
      { area:8, q:"Can you name at least two platforms that distribute music to streaming services?" },
      { area:8, q:"I have released at least one track through a distribution platform (DistroKid, TuneCore, etc.)." },
      { area:8, q:"I wait until a track sounds completely perfect before I release it.", inv:true },
      { area:8, q:"My releases include correct metadata — artist name, title, genre, and ISRC code." },
      { area:8, q:"I build in a promotional window of at least one week before my release goes live." },
      { area:8, q:"I have pitched or submitted at least one release to a playlist curator or editorial opportunity." },
      { area:8, q:"I review performance data from my releases and use it to inform future ones." },

      // ── PROMO (9) ────────────────────────────────
      { area:9, q:"I understand the difference between promoting my music and monetizing my music." },
      { area:9, q:"I have at least one active revenue stream related to my music." },
      { area:9, q:"I know at least three ways a producer can make money from their music." },
      { area:9, q:"I have submitted music for a sync opportunity, beat marketplace, or licensing deal in the last 6 months." },
      { area:9, q:"I have a clear idea of how I want my music to generate income." },
      { area:9, q:"I give away something music-related for free as a goodwill-building strategy." },
      { area:9, q:"I am waiting to be discovered rather than actively pursuing opportunities.", inv:true },
    ];

    // ═══════════════════════════════════════════════
    // GEOMETRY — 10 nodes per sector (1-2-3-4), organic jitter
    // ═══════════════════════════════════════════════
    const CX = 300, CY = 300;
    const HALF_SPREAD = 12 * Math.PI / 180;
    const NODE_COUNT = 10;

    function sectorRad(idx) { return (-90 + idx * 36) * Math.PI / 180; }

    function seededRand(seed) {
      let s = (seed * 1664525 + 1013904223) | 0;
      return () => { s = ((s * 1664525) + 1013904223) | 0; return (s >>> 0) / 4294967296; };
    }

    // Push overlapping nodes apart; pinned nodes don't move
    function separateNodes(allNodes, iterations = 12) {
      const flat = allNodes.flat();
      for (let iter = 0; iter < iterations; iter++) {
        for (let i = 0; i < flat.length; i++) {
          for (let j = i + 1; j < flat.length; j++) {
            const a = flat[i], b = flat[j];
            const dx = b.x - a.x, dy = b.y - a.y;
            const dist = Math.hypot(dx, dy);
            const minD = a.vr + b.vr + 2;
            if (dist < minD && dist > 0.01) {
              const push = (minD - dist) / 2;
              const nx = dx / dist, ny = dy / dist;
              if (!a.pinned) { a.x -= nx * push; a.y -= ny * push; }
              if (!b.pinned) { b.x += nx * push; b.y += ny * push; }
            }
          }
        }
      }
    }

    const RINGS = [
      { r: 65,  n: 1 },
      { r: 115, n: 2 },
      { r: 162, n: 3 },
      { r: 208, n: 4 },
    ];

    const ALL_NODES = AREAS.map((_, si) => {
      const cRad = sectorRad(si);
      const rand = seededRand(si * 9901 + 31337);
      const nodes = [];
      let ni = 0;
      RINGS.forEach((ring, ri) => {
        for (let i = 0; i < ring.n; i++) {
          const t = ring.n === 1 ? 0.5 : i / (ring.n - 1);
          const baseAngle = cRad - HALF_SPREAD + t * 2 * HALF_SPREAD;
          const angJitter = (rand() - 0.5) * 6 * Math.PI / 180; // always consumed
          const rJitter   = (rand() - 0.5) * 18;                 // always consumed
          const pinned    = ri === 0 && i === Math.floor(ring.n / 2);
          nodes.push({
            x: CX + (ring.r + (pinned ? 0 : rJitter)) * Math.cos(baseAngle + (pinned ? 0 : angJitter)),
            y: CY + (ring.r + (pinned ? 0 : rJitter)) * Math.sin(baseAngle + (pinned ? 0 : angJitter)),
            ri, ni: ni++,
            vr: 3.5 + ri * 1.4 + rand() * 1.8,
            pinned,
          });
        }
      });
      return nodes;
    });

    separateNodes(ALL_NODES);

    // Fixed radial point at first ring radius — keeps spokes exactly perpendicular to hub
    const SPOKE_TARGETS = AREAS.map((_, si) => {
      const rad = sectorRad(si);
      return { x: CX + RINGS[0].r * Math.cos(rad), y: CY + RINGS[0].r * Math.sin(rad) };
    });

    // Label positions (beyond outermost ring)
    const LABEL_POS = AREAS.map((_, i) => {
      const rad = sectorRad(i);
      return { x: CX + 234 * Math.cos(rad), y: CY + 234 * Math.sin(rad) };
    });

    // ═══════════════════════════════════════════════
    // CONDUIT EDGES — pre-determined non-crossing wiring
    // ═══════════════════════════════════════════════
    // Each array is: for each outer node [0..n-1], which inner node index to connect to.
    // All patterns are monotone (non-decreasing) → edges never cross.
    // Rings are now 1-2-3-4, so transitions are 1→2, 2→3, 3→4.
    const WIRE_1_2 = [[0, 0]];                            // only option: both connect to single inner
    const WIRE_2_3 = [[0, 0, 1], [0, 1, 1]];              // fan left or fan right
    const WIRE_3_4 = [
      [0, 0, 1, 2], // inner[0] fans
      [0, 1, 1, 2], // inner[1] fans
      [0, 1, 2, 2], // inner[2] fans
    ];
    // [2→3 pattern, 3→4 pattern] per sector — 2×3=6 unique, cycling across 10 sectors
    const SECTOR_WIRE = [
      [0,0],[0,1],[0,2],[1,0],[1,1],[1,2],
      [0,0],[0,1],[0,2],[1,0],
    ];

    const EDGE_MAP = ALL_NODES.map((nodes, si) => {
      const byRing = [[], [], [], []];
      nodes.forEach(n => byRing[n.ri].push(n));
      const cRad = sectorRad(si);
      const normDiff = a => { let d = (Math.atan2(a.y-CY,a.x-CX) - cRad) % (2*Math.PI); if (d > Math.PI) d -= 2*Math.PI; if (d < -Math.PI) d += 2*Math.PI; return d; };
      byRing.forEach(ring => ring.sort((a, b) => normDiff(a) - normDiff(b)));

      const [p23, p34] = SECTOR_WIRE[si];
      const transitions = [
        [byRing[0], byRing[1], WIRE_1_2[0]],
        [byRing[1], byRing[2], WIRE_2_3[p23]],
        [byRing[2], byRing[3], WIRE_3_4[p34]],
      ];
      const edges = [];
      transitions.forEach(([inner, outer, pattern]) => {
        outer.forEach((outerNode, oi) => {
          const innerNode = inner[pattern[oi]];
          edges.push({ x1: innerNode.x, y1: innerNode.y, x2: outerNode.x, y2: outerNode.y,
            fromNi: innerNode.ni, toNi: outerNode.ni });
        });
      });
      return edges.map(e => ({ ...e, len: Math.hypot(e.x2-e.x1, e.y2-e.y1) }));
    });

    const FULL_VB   = [0, 0, 600, 600];
    const SURVEY_VB = [75, 0, 450, 420]; // hub ~71% down frame, labels at ~19% from top

    // ═══════════════════════════════════════════════
    // STORAGE
    // ═══════════════════════════════════════════════
    const LS = 'pst_v4';
    const lsSave  = s  => { try { localStorage.setItem(LS, JSON.stringify(s)); } catch {} };
    const lsLoad  = () => { try { const s = localStorage.getItem(LS); return s ? JSON.parse(s) : null; } catch { return null; } };
    const lsClear = () => { try { localStorage.removeItem(LS); } catch {} };

    // ═══════════════════════════════════════════════
    // PARTICLES
    // ═══════════════════════════════════════════════
    let _pc = null;
    async function fireParticles(color) {
      const svg = document.querySelector('.constellation-svg');
      if (!svg) return;
      if (_pc) { try { _pc.destroy(); } catch {} }
      const rect = svg.getBoundingClientRect();
      const px = rect.left + rect.width * 0.5;
      const py = rect.top  + rect.height * 0.16;
      _pc = await tsParticles.load('particles-host', {
        fullScreen: { enable: false }, background: { color: 'transparent' },
        particles: {
          number: { value: 0 },
          color: { value: [color, '#ffffff'] },
          opacity: { value: 0.7, animation: { enable: true, speed: 1.2, minimumValue: 0, destroy: 'min' } },
          size: { value: { min: 1.5, max: 4 } },
          move: { enable: true, speed: { min: 2, max: 6 }, random: true, outModes: 'destroy',
                  gravity: { enable: true, acceleration: 5 } },
          life: { duration: { sync: true, value: 1.1 }, count: 1 },
        },
        emitters: {
          position: { x: (px / window.innerWidth) * 100, y: (py / window.innerHeight) * 100 },
          life: { count: 1, duration: 0.09 },
          rate: { quantity: 22, delay: 0 },
        },
      });
    }

    // ═══════════════════════════════════════════════
    // HELPERS
    // ═══════════════════════════════════════════════
    // Remap raw score [0,7] → [1,10]
    const toTen    = raw => Math.max(1, Math.min(10, Math.round((raw / 7) * 9) + 1));
    const litCount = raw => Math.round(raw * NODE_COUNT / 7);

    function getCompletedAreas(qIdx) {
      const done = [];
      for (let i = 0; i < 10; i++) { if (qIdx >= (i + 1) * 7) done.push(i); }
      return done;
    }

    function parseAns(text) {
      const i = text.indexOf(' — ');
      if (i !== -1) return { main: text.slice(0, i), sub: text.slice(i + 3) };
      return { main: text, sub: null };
    }

    const isValidEmail = email => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim());

    // Hub label — wraps long names to 2 lines
    function HubLabel({ displayName }) {
      const text = displayName.toUpperCase();
      if (text.length <= 9) {
        const fs = text.length > 6 ? 6.5 : 7.5;
        return (
          <text x={CX} y={CY} textAnchor="middle" dominantBaseline="middle"
            fontSize={fs} fontWeight="800" fill="#F0C400"
            fontFamily="system-ui, sans-serif" letterSpacing="0.4">{text}</text>
        );
      }
      const words = text.split(' ');
      if (words.length >= 2) {
        const mid = Math.ceil(words.length / 2);
        const l1 = words.slice(0, mid).join(' '), l2 = words.slice(mid).join(' ');
        const fs = Math.max(4.5, 7 - Math.max(l1.length, l2.length) * 0.28);
        return (
          <text x={CX} textAnchor="middle" fontWeight="800" fill="#F0C400"
            fontFamily="system-ui, sans-serif" letterSpacing="0.3" fontSize={fs}>
            <tspan x={CX} dy={`${CY - 5}`}>{l1}</tspan>
            <tspan x={CX} dy="9">{l2}</tspan>
          </text>
        );
      }
      const fs = Math.max(4, 7.5 - (text.length - 9) * 0.3);
      return (
        <text x={CX} y={CY} textAnchor="middle" dominantBaseline="middle"
          fontSize={fs} fontWeight="800" fill="#F0C400"
          fontFamily="system-ui, sans-serif" letterSpacing="0.2">{text.slice(0, 13)}</text>
      );
    }

    // ═══════════════════════════════════════════════
    // CONSTELLATION SVG
    // ═══════════════════════════════════════════════
    function Constellation({ scores, activeArea, completedAreas, displayName, newNodes, newEdges, rotDeg = 0, viewBoxArr }) {
      const vb = (viewBoxArr || FULL_VB).map(v => typeof v === 'number' ? v.toFixed(1) : v).join(' ');
      const alphas = ['77', '99', 'BB', 'DD'];

      return (
        <svg className="constellation-svg" viewBox={vb}
          preserveAspectRatio="xMidYMid meet"
          xmlns="http://www.w3.org/2000/svg">
          <g transform={`rotate(${rotDeg}, ${CX}, ${CY})`}>

            {/* Spokes — connect hub edge to actual nearest inner node */}
            {AREAS.map((area, si) => {
              const done = completedAreas.includes(si), active = si === activeArea;
              const rad = sectorRad(si);
              const x1 = CX + 26 * Math.cos(rad), y1 = CY + 26 * Math.sin(rad);
              const target = SPOKE_TARGETS[si];
              return (
                <line key={si} x1={x1} y1={y1} x2={target.x} y2={target.y}
                  stroke={done ? area.color + '33' : active ? area.color + '18' : '#161616'}
                  strokeWidth={done ? 1.0 : 0.6} />
              );
            })}

            {/* Conduit edges */}
            {EDGE_MAP.map((edges, si) => {
              const score = scores[si] || 0;
              const lit   = litCount(score);
              const color = AREAS[si].color;
              return edges.map((edge, ei) => {
                const isLit = edge.toNi < lit;
                const isNew = newEdges ? newEdges.has(`${si}-${ei}`) : false;
                if (!isLit) return (
                  <line key={`e-${si}-${ei}`}
                    x1={edge.x1} y1={edge.y1} x2={edge.x2} y2={edge.y2}
                    stroke="#181818" strokeWidth="0.7" />
                );
                if (isNew) return (
                  <line key={`e-${si}-${ei}-new`}
                    x1={edge.x1} y1={edge.y1} x2={edge.x2} y2={edge.y2}
                    stroke={color} strokeWidth="1.3"
                    style={{ '--edge-len': edge.len,
                      strokeDasharray: `${edge.len} ${edge.len}`,
                      animation: 'conduit-flow 1.1s ease forwards' }} />
                );
                return (
                  <line key={`e-${si}-${ei}`}
                    x1={edge.x1} y1={edge.y1} x2={edge.x2} y2={edge.y2}
                    stroke={color} strokeWidth="1.3" opacity="0.65" />
                );
              });
            })}

            {/* Nodes */}
            {AREAS.map((area, si) => {
              const score = scores[si] || 0;
              const lit   = litCount(score);
              const active = si === activeArea;
              return ALL_NODES[si].map(node => {
                const isLit  = node.ni < lit;
                const nodeId = `${si}-${node.ni}`;
                const isNew  = newNodes ? newNodes.has(nodeId) : false;
                const fill   = isLit ? (area.color + alphas[node.ri]) : '#0d0d0d';
                const stroke = isLit ? area.color + '44' : (active ? area.color + '14' : '#1e1e1e');
                const glow   = isLit ? `drop-shadow(0 0 ${2 + node.ri * 1.5}px ${area.color}55)` : 'none';
                return (
                  <circle key={isNew ? `${nodeId}-n` : nodeId}
                    className={isNew ? 'node-new' : undefined}
                    cx={node.x} cy={node.y} r={node.vr}
                    fill={fill} stroke={stroke} strokeWidth={0.6}
                    style={{ filter: glow }} />
                );
              });
            })}

            {/* Labels — full area name, counter-rotated, truncated if needed */}
            {LABEL_POS.map((lp, i) => {
              const done = completedAreas.includes(i), active = i === activeArea;
              const label = AREAS[i].label.length > 12 ? AREAS[i].label.slice(0, 11) + '.' : AREAS[i].label;
              return (
                <text key={i} transform={`rotate(${-rotDeg}, ${lp.x}, ${lp.y})`}
                  x={lp.x} y={lp.y} textAnchor="middle" dominantBaseline="middle"
                  fontSize="8.5" fontWeight="800" letterSpacing="0.6"
                  fill={done ? AREAS[i].color : active ? AREAS[i].color + '66' : '#2a2a2a'}
                  fontFamily="system-ui, sans-serif">
                  {label.toUpperCase()}
                </text>
              );
            })}
          </g>

          {/* Center hub — fixed, not rotated */}

    // SURVEY SCREEN
    // ═══════════════════════════════════════════════
    function SurveyScreen({ name, displayName, initScores, initQIdx, onComplete }) {
      const [scores, setScores]            = useState(initScores || Array(10).fill(0));
      const [qIdx, setQIdx]                = useState(initQIdx  || 0);
      const [selected, setSelected]        = useState(null);
      const [completedAreas, setCompleted] = useState(() => getCompletedAreas(initQIdx || 0));
      const [newNodes, setNewNodes]        = useState(null);
      const [newEdges, setNewEdges]        = useState(null);
      // Answer history for back button: [{area, pts}]
      const [history, setHistory]          = useState([]);

      const initialArea = Math.floor((initQIdx || 0) / 7);
      const [rotDeg, setRotDeg]       = useState(-initialArea * 36);
      const [viewBoxArr, setViewBoxArr] = useState(FULL_VB);
      const rotRef = useRef(-initialArea * 36);
      const vbRef  = useRef([...FULL_VB]);

      const q      = QUESTIONS[qIdx];
      const area   = Math.floor(qIdx / 7);
      const areaQ  = qIdx % 7;
      const progress = qIdx / QUESTIONS.length;

      useEffect(() => { lsSave({ name, displayName, scores, qIdx, completedAreas }); }, [scores, qIdx]);

      // Zoom into survey viewbox on mount
      useEffect(() => {
        const from = { x: FULL_VB[0], y: FULL_VB[1], w: FULL_VB[2], h: FULL_VB[3] };
        const anim = anime({
          targets: from,
          x: SURVEY_VB[0], y: SURVEY_VB[1], w: SURVEY_VB[2], h: SURVEY_VB[3],
          duration: 900, easing: 'easeInOutQuad', delay: 400,
          update: () => { vbRef.current = [from.x, from.y, from.w, from.h]; setViewBoxArr([...vbRef.current]); },
        });
        return () => anim.pause();
      }, []);

      // Rotate to bring active area to top
      useEffect(() => {
        const target = -area * 36;
        const from = { r: rotRef.current };
        const anim = anime({
          targets: from, r: target, duration: 700, easing: 'easeInOutQuad',
          update: () => { rotRef.current = from.r; setRotDeg(from.r); },
        });
        return () => anim.pause();
      }, [area]);

      const handleAnswer = useCallback((pts) => {
        setSelected(pts);
        const prevScore = scores[area];
        const newScores = [...scores];
        newScores[area] = Math.min(7, newScores[area] + pts);
        setScores(newScores);

        // Track history for back button
        setHistory(h => [...h, { area, pts }]);

        const prevLit = litCount(prevScore);
        const nextLit = litCount(newScores[area]);

        const burst = new Set();
        for (let ni = prevLit; ni < nextLit; ni++) burst.add(`${area}-${ni}`);
        setNewNodes(burst);

        const edgeBurst = new Set();
        EDGE_MAP[area].forEach((edge, ei) => {
          if (edge.toNi >= prevLit && edge.toNi < nextLit) edgeBurst.add(`${area}-${ei}`);
        });
        setNewEdges(edgeBurst);

        setTimeout(() => { setNewNodes(null); setNewEdges(null); }, 1300);

        const isAreaDone = areaQ === 6;
        const newCompleted = [...completedAreas];
        if (isAreaDone && !newCompleted.includes(area)) {
          newCompleted.push(area);
          setCompleted(newCompleted);
          setTimeout(() => fireParticles(AREAS[area].color), 80);
        }

        setTimeout(() => {
          setSelected(null);
          const next = qIdx + 1;
          if (next >= QUESTIONS.length) onComplete(newScores, [...history, { area, pts }]);
          else setQIdx(next);
        }, 600);
      }, [scores, qIdx, completedAreas, area, areaQ]);

      const handleBack = useCallback(() => {
        if (qIdx === 0 || selected !== null) return;
        const last = history[history.length - 1];
        if (!last) return;

        // Undo score
        const newScores = [...scores];
        newScores[last.area] = Math.max(0, newScores[last.area] - last.pts);
        setScores(newScores);
        setHistory(h => h.slice(0, -1));

        // Remove from completed if this was the area-completing question
        const prevQIdx = qIdx - 1;
        const prevArea = Math.floor(prevQIdx / 7);
        const prevAreaQ = prevQIdx % 7;
        if (prevAreaQ === 6 && completedAreas.includes(prevArea)) {
          setCompleted(completedAreas.filter(a => a !== prevArea));
        }

        setQIdx(prevQIdx);
      }, [qIdx, scores, history, completedAreas, selected]);

      return (
        <div className="screen survey-screen">
          <div className="survey-tree-panel">
            <div className="xp-bar-wrap">
              <div className="xp-meta">
                <span>Producer Skill Tree</span>
                <span>{Math.round(progress * 100)}% mapped</span>
              </div>
              <div className="xp-track">
                <div className="xp-fill" style={{
                  width: `${progress * 100}%`,
                  background: `linear-gradient(90deg, ${AREAS[area].color}66, ${AREAS[area].color})`,
                }} />
              </div>
            </div>
            <Constellation
              scores={scores} activeArea={area} completedAreas={completedAreas}
              displayName={displayName} newNodes={newNodes} newEdges={newEdges}
              rotDeg={rotDeg} viewBoxArr={viewBoxArr}
            />
          </div>
          {q && (
            <QuestionCard
              question={q} areaLabel={AREAS[area].label}
              areaColor={AREAS[area].color} areaQ={areaQ}
              onAnswer={handleAnswer} onBack={handleBack}
              canGoBack={qIdx > 0 && selected === null && history.length > 0}
              selected={selected}
            />
          )}
        </div>
      );
    }

    // RESULTS SCREEN — sequential bar fill + countup
    // ═══════════════════════════════════════════════
    function ResultsScreen({ name, displayName, scores, answers, onReveal }) {
      const [email, setEmail]             = useState('');
      const [emailTouched, setEmailTouched] = useState(false);
      const [submitting, setSubmitting]   = useState(false);
      const [submitError, setSubmitError] = useState(null);
      const [barWidths, setBarWidths] = useState(Array(10).fill(0));
      const [displayed, setDisplayed] = useState(Array(10).fill(0));
      const cancelRef = useRef(false);

      useEffect(() => {
        cancelRef.current = false;
        const delay = ms => new Promise(res => setTimeout(res, ms));

        async function animateSequential() {
          await delay(350);
          for (let i = 0; i < 10; i++) {
            if (cancelRef.current) return;
            const barTarget = (toTen(scores[i]) / 10) * 100;
            await new Promise(resolve => {
              const start = performance.now(), dur = 380;
              function fillBar(ts) {
                if (cancelRef.current) { resolve(); return; }
                const t = Math.min((ts - start) / dur, 1);
                const eased = 1 - Math.pow(1 - t, 3);
                setBarWidths(prev => { const n = [...prev]; n[i] = barTarget * eased; return n; });
                if (t < 1) requestAnimationFrame(fillBar); else resolve();
              }
              requestAnimationFrame(fillBar);
            });
            const target = toTen(scores[i]);
            for (let v = 1; v <= target; v++) {
              if (cancelRef.current) return;
              await delay(52);
              setDisplayed(prev => { const n = [...prev]; n[i] = v; return n; });
            }
            await delay(70);
          }
        }

        animateSequential();
        return () => { cancelRef.current = true; };
      }, []);

      const valid = isValidEmail(email);
      const showError = emailTouched && !valid;

      const handleSubmit = async () => {
        setEmailTouched(true);
        if (!valid || submitting) return;
        setSubmitting(true);
        setSubmitError(null);
        try {
          const res  = await fetch(WORKER_URL, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ name, displayName, email: email.trim(), scores: scores.map(toTen), answers: answers.map(h => h.pts) }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Submission failed');
          lsClear();
          onReveal(email);
        } catch (err) {
          setSubmitError(err.message || 'Something went wrong — please try again.');
          setSubmitting(false);
        }
      };

      const sorted    = AREAS.map((a, i) => ({ ...a, score: scores[i] }));
      const strongest = [...sorted].sort((a, b) => b.score - a.score)[0];
      const weakest   = [...sorted].sort((a, b) => a.score - b.score)[0];

      return (
        <div className="screen results-screen">
          <div className="results-header">
            <h2>{displayName}'s Skill Tree</h2>
            <p>Strength: {strongest.label} · Opportunity: {weakest.label}</p>
          </div>
          <div className="score-grid">
            {AREAS.map((area, i) => (
              <div key={area.id} className="score-row">
                <div className="score-lbl">{area.label}</div>
                <div className="score-track">
                  <div className="score-fill" style={{
                    width: `${barWidths[i]}%`,
                    background: `linear-gradient(90deg, ${area.color}66, ${area.color})`,
                  }} />
                </div>
                <div className="score-val" style={{ color: area.color }}>{displayed[i]}/10</div>
              </div>
            ))}
          </div>
          <div className="email-gate">
            <h3>See your full Skill Tree.</h3>
            <p>Enter your email to unlock your complete Producer Skill Tree — we'll show your full results on the next screen.</p>
            <div className="email-row">
              <input className={`email-input${showError ? ' invalid' : ''}`}
                type="email" placeholder="producer@email.com"
                value={email}
                onChange={e => { setEmail(e.target.value); setEmailTouched(false); }}
                onBlur={() => setEmailTouched(true)}
                onKeyDown={e => e.key === 'Enter' && handleSubmit()} />
              <button className="btn-submit" onClick={handleSubmit}
                disabled={submitting}>
                {submitting ? '...' : 'Enter'}
              </button>
            </div>
            {showError && (
              <div style={{ fontSize: 10, color: '#FC8181', marginTop: -4 }}>
                Please enter a valid email address.
              </div>
            )}
            {submitError && (
              <div style={{ fontSize: 10, color: '#FC8181', marginTop: -4 }}>
                {submitError}
              </div>
            )}
          </div>
        </div>
      );
    }

    const WELCOME_MSG = "Welcome back. I'm your FP Coach — here to support your work between sessions, trained on The FP's Compass framework and methodologies. FP+ members can log wins, earn XP, complete homework, and dig into any aspect of music production. What's on your mind?";

    function AgentInfoBtn() {

    function AgentScreen({ email, scores, selectedAnswer, isReturning }) {
      const [messages, setMessages]   = useState([]);
      const [input, setInput]         = useState('');
      const [loading, setLoading]     = useState(false);
      const [toast, setToast]         = useState(null); // { text, key }
      const bottomRef                 = useRef(null);
      const hasOpened                 = useRef(false);
      const toastTimer                = useRef(null);

      function showToast(text) {
        clearTimeout(toastTimer.current);
        setToast({ text, key: Date.now() });
        toastTimer.current = setTimeout(() => setToast(null), 3000);
      }

      useEffect(() => {
        if (hasOpened.current) return;
        hasOpened.current = true;
        if (isReturning) return; // welcome shown as static bubble; wait for user
        const opening = [{ role: 'user', content: selectedAnswer }];
        setMessages(opening);
        call(opening);
      }, []);

      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, loading]);

      async function call(msgs) {
        setLoading(true);
        try {
          const res = await fetch('/api/agent', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, scores, selectedAnswer, messages: msgs }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Request failed');
          setMessages(m => [...m, { role: 'assistant', content: data.message }]);
          if (data.saved) {
            if (data.levelUp) {
              showToast(`Level up! You're now Level ${data.levelUp} 🎯`);
            } else if (data.wins?.length) {
              showToast(`Win logged · +${data.wins.length * 10} XP`);
            } else if (data.homework) {
              showToast('Homework saved');
            } else {
              showToast('Progress saved');
            }
          }
        } catch (err) {
          setMessages(m => [...m, { role: 'assistant', content: `Error: ${err.message}` }]);
        } finally {
          setLoading(false);
        }
      }

      function send() {
        const text = input.trim();
        if (!text || loading) return;
        const next = [...messages, { role: 'user', content: text }];
        setMessages(next);
        setInput('');
        call(next);
      }

      function onKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
      }

      return (
        <div className="screen agent-screen">
          <div className="agent-header">
            <div className="agent-header-dot" />
            <div className="agent-header-label">FP Coach</div>
            <AgentInfoBtn />
          </div>
          <div className="agent-messages">
            {isReturning && messages.length === 0 && (
              <div className="agent-msg assistant">
                <div className="agent-bubble">{WELCOME_MSG}</div>
              </div>
            )}
            {messages.map((m, i) => (
              <div key={i} className={`agent-msg ${m.role}`}>
                <div className="agent-bubble">{m.content}</div>
              </div>
            ))}
            {loading && (
              <div className="agent-msg assistant">
                <div className="agent-typing">
                  <span /><span /><span />
                </div>
              </div>
            )}
            <div ref={bottomRef} />
          </div>
          <div className="agent-input-row">
            <textarea
              className="agent-input"
              placeholder="Reply…"
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={onKey}
              rows={1}
            />
            <button className="btn-agent-send" onClick={send} disabled={loading || !input.trim()}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M14 8L2 2l2.5 6L2 14l12-6z" fill="currentColor"/>
              </svg>
            </button>
          </div>
          {toast && (
            <div key={toast.key} className="agent-toast">{toast.text}</div>
          )}
        </div>
      );
    }

                </button>
              </div>
              {loginError && <div style={{ fontSize: 11, color: '#FC8181' }}>{loginError}</div>}
            </div>
          )}
          <div className="title-copyright">
            <div>© 2026 The Free Producer</div>
            <a href="https://skool.com/the-free-producer/about" target="_blank" rel="noopener">skool.com/the-free-producer</a>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════
    // NAME SCREEN
    // ═══════════════════════════════════════════════
    function NameScreen({ onNext }) {
      const [name, setName]         = useState('');
      const [step, setStep]         = useState('name');
      const [hasAlias, setHasAlias] = useState(null);
      const [alias, setAlias]       = useState('');
      const [localFade, setLocalFade] = useState(false);
      const QUICK_MS = 180;

      const goToAlias = () => {
        if (!name.trim()) return;
        setLocalFade(true);
        setTimeout(() => { setStep('alias'); setTimeout(() => setLocalFade(false), 30); }, QUICK_MS);
      };

      const canEnter = step === 'alias' &&
        (hasAlias === false || (hasAlias === true && alias.trim().length > 0));

      const goNext = () => {
        if (!canEnter) return;
        const dn = (hasAlias && alias.trim()) ? alias.trim() : name.trim().split(' ')[0];
        onNext(name.trim(), dn);
      };

      return (
        <div className="screen name-screen" style={{ opacity: localFade ? 0 : 1 }}>
          {step === 'name' ? (
            <>
              <h2>Your name</h2>
              <input className="name-input" type="text" value={name}
                onChange={e => setName(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && goToAlias()} autoFocus maxLength={40} />
              <button className="btn-primary" onClick={goToAlias} disabled={!name.trim()}>Enter</button>
            </>
          ) : (
            <>
              <h2>Do you have an alias?</h2>
              <div className="radio-row">
                <div className="radio-opt" onClick={() => setHasAlias(true)}>
                  <div className={`radio-circle${hasAlias === true ? ' on' : ''}`} /><span>Yes</span>
                </div>
                <div className="radio-opt" onClick={() => { setHasAlias(false); setAlias(''); }}>
                  <div className={`radio-circle${hasAlias === false ? ' on' : ''}`} /><span>No</span>
                </div>
              </div>
              <div className="alias-input-wrap">
                <input className="name-input" type="text" value={alias}
                  onChange={e => setAlias(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && goNext()}
                  maxLength={40}
                  style={{ visibility: hasAlias === true ? 'visible' : 'hidden',
                    pointerEvents: hasAlias === true ? 'auto' : 'none', width: '100%' }}
                  ref={el => { if (el && hasAlias === true) el.focus(); }} />
              </div>
              <button className="btn-primary" onClick={goNext} disabled={!canEnter}>Enter</button>
            </>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════
    // APP
    // ═══════════════════════════════════════════════
    function App() {
      const [screen, setScreen]           = useState('title');
      const [name, setName]               = useState('');
      const [displayName, setDisplayName] = useState('');
      const [scores, setScores]           = useState(Array(10).fill(0));
      const [answers, setAnswers]         = useState([]);
      const [email, setEmail]             = useState('');
      const [selectedAnswer, setSelected] = useState('');
      const [initQIdx, setInitQIdx]       = useState(0);
      const [initScores, setInitScores]   = useState(null);
      const [covering, setCovering]       = useState(true);
      const [savedData, setSavedData]     = useState(null);
      const [returningMode, setReturning] = useState(false);

      const FADE_MS = 1280;

      useEffect(() => {
        const saved = lsLoad();
        if (saved && saved.qIdx > 0 && saved.qIdx < QUESTIONS.length) setSavedData(saved);
        fetch('/api/session')
          .then(r => r.json())
          .then(data => {
            if (data.user) {
              setScores(data.user.scores || Array(10).fill(0));
              setEmail(data.user.email || '');
              setDisplayName(data.user.displayName || '');
              setReturning(true);
              setScreen('agent');
            } else {
              setScreen('title');
            }
          })
          .catch(() => setScreen('dev-gate'))
          .finally(() => requestAnimationFrame(() => requestAnimationFrame(() => setCovering(false))));
      }, []);

      function navigate(nextScreen, stateSetter) {
        setCovering(true);
        setTimeout(() => {
          if (stateSetter) stateSetter();
          setScreen(nextScreen);
          requestAnimationFrame(() => requestAnimationFrame(() => setCovering(false)));
        }, FADE_MS + 80);
      }

      const goTitle  = () => navigate('title');
      const handleReturning = (user) => navigate('agent', () => {
        setScores(user.scores || Array(10).fill(0));
        setEmail(user.email || '');
        setDisplayName(user.displayName || '');
        setReturning(true);
      });
      const goName   = () => navigate('name');
      const goSurvey = (n, dn) => navigate('survey', () => {
        setName(n); setDisplayName(dn);
        setInitQIdx(0); setInitScores(Array(10).fill(0));
      });
      const finish      = (s, a) => navigate('results', () => { setScores(s); setAnswers(a || []); });
      const goReveal    = (em) => navigate('reveal', () => { if (em) setEmail(em); });
      const goTransition = () => navigate('transition');
      const goAgent     = (answer) => navigate('agent', () => { setSelected(answer); setReturning(false); });
      const goResume = () => navigate('survey', () => {
        const s = savedData;
        setName(s.name || ''); setDisplayName(s.displayName || (s.name || '').split(' ')[0]);
        setInitQIdx(s.qIdx); setInitScores(s.scores || Array(10).fill(0));
      });
      return (
        <>
          {screen === 'title'    && <TitleScreen onStart={goName} onReturning={handleReturning} />}
          {screen === 'name'     && <NameScreen  onNext={goSurvey} />}
          {screen === 'survey'   && (
            <SurveyScreen name={name} displayName={displayName}
              initScores={initScores} initQIdx={initQIdx} onComplete={finish} />
          )}
          {screen === 'results'  && (
            <ResultsScreen name={name} displayName={displayName} scores={scores} answers={answers} onReveal={goReveal} />
          )}
          {screen === 'reveal' && <RevealScreen displayName={displayName} scores={scores} onSelect={goAgent} />}
          {screen === 'agent'  && <AgentScreen email={email} scores={scores} selectedAnswer={selectedAnswer} isReturning={returningMode} />}
          <div className={`transition-overlay${covering ? ' covering' : ''}`} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
